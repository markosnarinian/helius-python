name: Bug report
description: Report a bug in helius-python
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the
        sections below so we can reproduce and fix the issue quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        Minimal, runnable code snippet that reproduces the bug. Please redact
        your API key.
      render: python
      placeholder: |
        from helius.solana_rpc import HeliusClient

        with HeliusClient(api_key="...") as c:
            c.get_balance(public_key="...")
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full traceback if any.
      render: shell
    validations:
      required: true
  - type: input
    id: helius_version
    attributes:
      label: helius-python version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.5 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true
  - type: dropdown
    id: network
    attributes:
      label: Helius network
      options:
        - Mainnet
        - Devnet
        - Testnet
        - Other / not applicable
    validations:
      required: true
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Anything else that might be relevant (logs, screenshots, related issues).
